<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Uploader</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Main Content Container -->
    <div class="container mx-auto px-4 py-8 max-w-2xl flex-grow">
        <h1 class="text-3xl font-bold text-center mb-8">S3 Uploader</h1>
        <div class="bg-white rounded-lg shadow-md p-6">
            <form id="uploadForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">File</label>
                    <div class="space-y-2">
                        <input type="file" id="fileInput" name="file" class="w-full px-3 py-2 border rounded-md">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    INVIA FILE
                </button>

            </form>

            <!-- Progress Container -->
            <div id="uploadProgress" class="hidden mt-6">
                <div class="mb-2 flex justify-between items-center">
                    <span id="uploadStatus" class="text-sm text-gray-600">Preparazione upload...</span>
                    <span id="uploadPercentage" class="text-sm font-medium">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <!-- Clear Button -->
                <button style="margin-top: 1em;" id="clearBtn" onclick="clearPage();" type="button" class="hidden w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Nuovo upload
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white shadow-md mt-8">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="text-gray-600">
                    <p class="text-gray-500">Developed by Andrea Barbagallo</p>
                    <a href="https://www.andreabarbagallo.com/" 
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="text-blue-600 hover:text-blue-800 transition-colors duration-200">
                        AndreaBarbagallo.com
                    </a>
                </div>
                <div class="text-gray-500">
                    <p>&copy; Franco Fracassi {{ year }}. Tutti i diritti riservati.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>

        const uploadForm = document.getElementById('uploadForm');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadPercentage = document.getElementById('uploadPercentage');
        const clearBtn = document.getElementById('clearBtn');
        const fileInput = document.getElementById('fileInput');

        // Dimensione del chunk (5MB)
        const CHUNK_SIZE = 5 * 1024 * 1024;

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) {
                alert('Seleziona un file da caricare.');
                return;
            }

            // Nascondi il form e mostra la progress bar
            uploadForm.classList.add('hidden');
            uploadProgress.classList.remove('hidden');

            // Inizia l'upload
            startUpload(file);
        });

        async function startUpload(file) {
            const totalSize = file.size;
            let uploadedSize = 0;
            let partNumber = 1;
            let uploadUuid = null;

            while (uploadedSize < totalSize) {
                const chunk = file.slice(uploadedSize, uploadedSize + CHUNK_SIZE);
                const formData = new FormData();
                if (uploadUuid) {
                    formData.append('upload_uuid', uploadUuid);
                }
                formData.append('file_part', chunk);
                formData.append('part_number', partNumber);
                formData.append('file_name', file.name);
                if (partNumber === 1) {
                    formData.append('file_size', totalSize);
                }

                try {
                    const response = await fetch('/api/s3send', {
                        method: 'PUT',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Errore durante l\'upload.');
                    }

                    const data = await response.json();
                    uploadUuid = data.upload_uuid;

                    // Aggiorna la dimensione caricata
                    uploadedSize += chunk.size;
                    const progress = Math.min(Math.floor((uploadedSize / totalSize) * 100), 100);
                    updateProgress(progress, 'Upload in corso...');

                    partNumber += 1;

                } catch (error) {
                    updateProgress(0, `Errore: ${error.message}`);
                    clearBtn.classList.remove('hidden');
                    return;
                }
            }

            // Verifica lo stato finale
            checkFinalStatus(uploadUuid);
        }

        async function checkFinalStatus(uploadUuid) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/s3progress?upload_uuid=${uploadUuid}`);
                    if (!response.ok) {
                        throw new Error('Errore nel recupero dello stato.');
                    }

                    const data = await response.json();
                    uploadPercentage.textContent = `${data.progress}%`;
                    progressBar.style.width = `${data.progress}%`;

                    if (data.prg_status === 'COMPLETED') {
                        uploadStatus.textContent = 'Upload completato con successo!';
                        clearInterval(interval);
                        clearBtn.classList.remove('hidden');
                    } else if (data.prg_status === 'ERROR') {
                        uploadStatus.textContent = `Errore durante l'upload: ${data.err_msg}`;
                        clearInterval(interval);
                        clearBtn.classList.remove('hidden');
                    }
                } catch (error) {
                    uploadStatus.textContent = `Errore: ${error.message}`;
                    clearInterval(interval);
                    clearBtn.classList.remove('hidden');
                }
            }, 2000); // Aggiorna ogni 2 secondi
        }

        function updateProgress(percentage, status) {
            uploadPercentage.textContent = `${percentage}%`;
            progressBar.style.width = `${percentage}%`;
            uploadStatus.textContent = status;
        }

        function clearPage() {
            const form = document.getElementById('uploadForm');
            const statusText = document.getElementById('uploadStatus');
            const percentageText = document.getElementById('uploadPercentage');
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.querySelector('#uploadProgress div div');
            document.getElementById('clearBtn').classList.add('hidden');
            form.reset();
            form.classList.remove('hidden');
            progressContainer.classList.add('hidden');
            statusText.textContent = 'Preparazione upload...';
            progressBar.style.width = '0%';
            percentageText.textContent = '0%';            
        }

    </script>

</body>
</html>
